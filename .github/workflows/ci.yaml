name: Telegram Notifier CI

on:
  push:
    branches: [main]
    
jobs:
  test:
    name: Test Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Send Telegram Notification
        uses: ./
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: "✅ CI passed"
