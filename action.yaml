---
name: "Telegram Failure Notifier"
description: "Send Telegram message when GitHub Actions job fails"
author: "Sabbir Hossain Shuvo"

inputs:
  bot_token:
    description: "Telegram Bot Token"
    required: true

  chat_id:
    description: "Telegram Chat ID"
    required: true

  message:
    description: "Message to send"
    default: "❌ GitHub Actions job failed"
    required: false

  retry_count:
    description: "Number of retries"
    default: "2"
    required: false

  retry_delay:
    description: "Delay between retries (in seconds)"
    default: "5"
    required: false

  parse_mode:
    description: "Parse mode"
    default: "HTML"
    required: false

branding:
  icon: "message-square"
  color: "red"

runs:
  using: "composite"
  steps:
    - name: Send Telegram Notification
      shell: bash
      env:
        BOT_TOKEN: ${{ inputs.bot_token }}
        CHAT_ID: ${{ inputs.chat_id }}
        MESSAGE: ${{ inputs.message }}
        # Optional inputs
        RETRY_COUNT: ${{ inputs.retry_count }}
        RETRY_DELAY: ${{ inputs.retry_delay }}
        PARSE_MODE: ${{ inputs.parse_mode }}
      run: |
        chmod +x "$GITHUB_ACTION_PATH/scripts/send-telegram.sh"
        bash "$GITHUB_ACTION_PATH/scripts/send-telegram.sh"
